name: CI Backend

on:
  pull_request:
    paths:
      - "backend/**"
      - "scripts/**"
      - ".github/workflows/ci-backend.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "scripts/**"
      - ".github/workflows/ci-backend.yml"
  workflow_dispatch:

jobs:
  backend-static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install backend deps
        run: npm --prefix backend ci
      - name: Backend lint checks
        run: npm --prefix backend run lint
      - name: Root script syntax checks
        run: |
          node --check backend/src/memory/telemetry.js
          node --check scripts/smoke-v01.mjs
          node --check scripts/smoke-hire-readiness.mjs
          node --check scripts/multiuser-hire-isolation.mjs
          node --check scripts/multiuser-agent-isolation.mjs
          node --check scripts/multiuser-spaces-isolation.mjs
          node --check scripts/multiuser-learning-isolation.mjs
          node --check scripts/multiuser-isolation-suite.mjs
          node --check scripts/load-memory.mjs
          node --check scripts/backup-restore-drill.mjs

  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install backend deps
        run: npm --prefix backend ci
      - name: Backend tests
        run: npm --prefix backend test

  backend-pg-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ledgertest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ledgertest"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install backend deps
        run: npm --prefix backend ci
      - name: Create Postgres extensions (vector + pgcrypto)
        env:
          PGPASSWORD: test
        run: |
          psql -h localhost -p 5432 -U postgres -d ledgertest -v ON_ERROR_STOP=1 \
            -c 'CREATE EXTENSION IF NOT EXISTS vector; CREATE EXTENSION IF NOT EXISTS pgcrypto;'
      - name: Ledger real-Postgres integration tests
        working-directory: backend
        env:
          LEDGER_TEST_DATABASE_URL: postgres://postgres:test@localhost:5432/ledgertest
        run: node --experimental-vm-modules ./node_modules/jest/bin/jest.js --config jest.config.mjs --runInBand pg.integration

  api-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve smoke config
        id: smoke-config
        env:
          SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
          SMOKE_EMAIL: ${{ secrets.SMOKE_EMAIL }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "${SMOKE_BASE_URL}" ] && [ -n "${SMOKE_EMAIL}" ] && [ -n "${SMOKE_PASSWORD}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping API smoke: SMOKE_BASE_URL / SMOKE_EMAIL / SMOKE_PASSWORD not fully configured."
          fi

      - uses: actions/checkout@v4
        if: ${{ steps.smoke-config.outputs.enabled == 'true' }}
      - uses: actions/setup-node@v4
        if: ${{ steps.smoke-config.outputs.enabled == 'true' }}
        with:
          node-version: 20
      - name: API smoke test (auth + profile + entitlements)
        if: ${{ steps.smoke-config.outputs.enabled == 'true' }}
        env:
          SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
          SMOKE_EMAIL: ${{ secrets.SMOKE_EMAIL }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
        run: |
          set -euo pipefail
          curl -fsS "${SMOKE_BASE_URL}/health" > /dev/null

          login_json=$(curl -fsS -X POST "${SMOKE_BASE_URL}/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${SMOKE_EMAIL}\",\"password\":\"${SMOKE_PASSWORD}\"}")

          auth_token=$(node -e 'const raw = process.argv[1]; const data = JSON.parse(raw); if (!data?.token) process.exit(1); process.stdout.write(String(data.token));' "${login_json}")

          curl -fsS "${SMOKE_BASE_URL}/api/profile" \
            -H "Authorization: Bearer ${auth_token}" > /dev/null
          curl -fsS "${SMOKE_BASE_URL}/api/entitlements" \
            -H "Authorization: Bearer ${auth_token}" > /dev/null

          admin_status=$(curl -s -o /tmp/admin-access-codes.json -w "%{http_code}" \
            "${SMOKE_BASE_URL}/api/admin/access-codes?limit=1" \
            -H "Authorization: Bearer ${auth_token}")
          if [ "${admin_status}" != "200" ] && [ "${admin_status}" != "403" ]; then
            echo "Unexpected admin endpoint status: ${admin_status}"
            cat /tmp/admin-access-codes.json
            exit 1
          fi

  hire-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve Hire smoke config
        id: hire-smoke-config
        env:
          HIRE_SMOKE_BASE_URL: ${{ secrets.HIRE_SMOKE_BASE_URL }}
          SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
          HIRE_SMOKE_ADMIN_EMAIL: ${{ secrets.HIRE_SMOKE_ADMIN_EMAIL }}
          HIRE_SMOKE_ADMIN_PASSWORD: ${{ secrets.HIRE_SMOKE_ADMIN_PASSWORD }}
          SMOKE_ADMIN_EMAIL: ${{ secrets.SMOKE_ADMIN_EMAIL }}
          SMOKE_ADMIN_PASSWORD: ${{ secrets.SMOKE_ADMIN_PASSWORD }}
          SMOKE_EMAIL: ${{ secrets.SMOKE_EMAIL }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
          HIRE_SMOKE_USER_A_EMAIL: ${{ secrets.HIRE_SMOKE_USER_A_EMAIL }}
          HIRE_SMOKE_USER_A_PASSWORD: ${{ secrets.HIRE_SMOKE_USER_A_PASSWORD }}
          HIRE_SMOKE_USER_B_EMAIL: ${{ secrets.HIRE_SMOKE_USER_B_EMAIL }}
          HIRE_SMOKE_USER_B_PASSWORD: ${{ secrets.HIRE_SMOKE_USER_B_PASSWORD }}
        run: |
          set -euo pipefail
          base_url="${HIRE_SMOKE_BASE_URL:-${SMOKE_BASE_URL:-}}"
          admin_email="${HIRE_SMOKE_ADMIN_EMAIL:-${SMOKE_ADMIN_EMAIL:-${SMOKE_EMAIL:-}}}"
          admin_password="${HIRE_SMOKE_ADMIN_PASSWORD:-${SMOKE_ADMIN_PASSWORD:-${SMOKE_PASSWORD:-}}}"
          if [ -n "${base_url}" ] && [ -n "${admin_email}" ] && [ -n "${admin_password}" ]; then
            echo "readiness_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "readiness_enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping Hire readiness smoke: HIRE_SMOKE_BASE_URL / HIRE_SMOKE_ADMIN_EMAIL / HIRE_SMOKE_ADMIN_PASSWORD not fully configured."
          fi

          if [ -n "${base_url}" ] && \
             [ -n "${HIRE_SMOKE_USER_A_EMAIL}" ] && [ -n "${HIRE_SMOKE_USER_A_PASSWORD}" ] && \
             [ -n "${HIRE_SMOKE_USER_B_EMAIL}" ] && [ -n "${HIRE_SMOKE_USER_B_PASSWORD}" ]; then
            echo "isolation_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "isolation_enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping Hire isolation smoke: HIRE_SMOKE_USER_A_* / HIRE_SMOKE_USER_B_* not fully configured."
          fi

      - uses: actions/checkout@v4
        if: ${{ steps.hire-smoke-config.outputs.readiness_enabled == 'true' || steps.hire-smoke-config.outputs.isolation_enabled == 'true' }}
      - uses: actions/setup-node@v4
        if: ${{ steps.hire-smoke-config.outputs.readiness_enabled == 'true' || steps.hire-smoke-config.outputs.isolation_enabled == 'true' }}
        with:
          node-version: 20

      - name: ZAKI Hire readiness smoke
        if: ${{ steps.hire-smoke-config.outputs.readiness_enabled == 'true' }}
        env:
          HIRE_SMOKE_BASE_URL: ${{ secrets.HIRE_SMOKE_BASE_URL }}
          SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
          HIRE_SMOKE_ADMIN_EMAIL: ${{ secrets.HIRE_SMOKE_ADMIN_EMAIL }}
          HIRE_SMOKE_ADMIN_PASSWORD: ${{ secrets.HIRE_SMOKE_ADMIN_PASSWORD }}
          SMOKE_ADMIN_EMAIL: ${{ secrets.SMOKE_ADMIN_EMAIL }}
          SMOKE_ADMIN_PASSWORD: ${{ secrets.SMOKE_ADMIN_PASSWORD }}
          SMOKE_EMAIL: ${{ secrets.SMOKE_EMAIL }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
          HIRE_SMOKE_USER_EMAIL: ${{ secrets.HIRE_SMOKE_USER_EMAIL }}
          HIRE_SMOKE_USER_PASSWORD: ${{ secrets.HIRE_SMOKE_USER_PASSWORD }}
          SMOKE_USER_EMAIL: ${{ secrets.SMOKE_USER_EMAIL }}
          SMOKE_USER_PASSWORD: ${{ secrets.SMOKE_USER_PASSWORD }}
        run: |
          set -euo pipefail
          export SMOKE_BASE_URL="${HIRE_SMOKE_BASE_URL:-${SMOKE_BASE_URL:-}}"
          export SMOKE_ADMIN_EMAIL="${HIRE_SMOKE_ADMIN_EMAIL:-${SMOKE_ADMIN_EMAIL:-${SMOKE_EMAIL:-}}}"
          export SMOKE_ADMIN_PASSWORD="${HIRE_SMOKE_ADMIN_PASSWORD:-${SMOKE_ADMIN_PASSWORD:-${SMOKE_PASSWORD:-}}}"
          export SMOKE_USER_EMAIL="${HIRE_SMOKE_USER_EMAIL:-${SMOKE_USER_EMAIL:-${SMOKE_ADMIN_EMAIL}}}"
          export SMOKE_USER_PASSWORD="${HIRE_SMOKE_USER_PASSWORD:-${SMOKE_USER_PASSWORD:-${SMOKE_ADMIN_PASSWORD}}}"
          node scripts/smoke-hire-readiness.mjs

      - name: ZAKI Hire two-user isolation smoke
        if: ${{ steps.hire-smoke-config.outputs.isolation_enabled == 'true' }}
        env:
          HIRE_SMOKE_BASE_URL: ${{ secrets.HIRE_SMOKE_BASE_URL }}
          SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
          HIRE_SMOKE_USER_A_EMAIL: ${{ secrets.HIRE_SMOKE_USER_A_EMAIL }}
          HIRE_SMOKE_USER_A_PASSWORD: ${{ secrets.HIRE_SMOKE_USER_A_PASSWORD }}
          HIRE_SMOKE_USER_B_EMAIL: ${{ secrets.HIRE_SMOKE_USER_B_EMAIL }}
          HIRE_SMOKE_USER_B_PASSWORD: ${{ secrets.HIRE_SMOKE_USER_B_PASSWORD }}
        run: |
          set -euo pipefail
          export ZAKI_BASE_URL="${HIRE_SMOKE_BASE_URL:-${SMOKE_BASE_URL:-}}"
          export HIRE_USER_A_EMAIL="${HIRE_SMOKE_USER_A_EMAIL}"
          export HIRE_USER_A_PASSWORD="${HIRE_SMOKE_USER_A_PASSWORD}"
          export HIRE_USER_B_EMAIL="${HIRE_SMOKE_USER_B_EMAIL}"
          export HIRE_USER_B_PASSWORD="${HIRE_SMOKE_USER_B_PASSWORD}"
          node scripts/multiuser-hire-isolation.mjs

  isolation-suite:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve isolation config
        id: iso-config
        env:
          ZAKI_ISOLATION_BASE_URL: ${{ secrets.ZAKI_ISOLATION_BASE_URL }}
          SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
          ZAKI_MULTIUSER_TOKENS: ${{ secrets.ZAKI_MULTIUSER_TOKENS }}
        run: |
          set -euo pipefail
          base_url="${ZAKI_ISOLATION_BASE_URL:-${SMOKE_BASE_URL:-}}"
          if [ -n "${base_url}" ] && [ -n "${ZAKI_MULTIUSER_TOKENS}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping isolation suite: ZAKI_ISOLATION_BASE_URL/SMOKE_BASE_URL + ZAKI_MULTIUSER_TOKENS not configured."
          fi
      - uses: actions/checkout@v4
        if: ${{ steps.iso-config.outputs.enabled == 'true' }}
      - uses: actions/setup-node@v4
        if: ${{ steps.iso-config.outputs.enabled == 'true' }}
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install backend deps (pg/bcryptjs for learning step)
        if: ${{ steps.iso-config.outputs.enabled == 'true' }}
        run: npm --prefix backend ci
      - name: Multi-user isolation suite (required mode)
        if: ${{ steps.iso-config.outputs.enabled == 'true' }}
        env:
          ZAKI_ISOLATION_REQUIRED: '1'
          ZAKI_ISOLATION_BASE_URL: ${{ secrets.ZAKI_ISOLATION_BASE_URL }}
          SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
          ZAKI_MULTIUSER_TOKENS: ${{ secrets.ZAKI_MULTIUSER_TOKENS }}
          HIRE_USER_A_EMAIL: ${{ secrets.HIRE_SMOKE_USER_A_EMAIL }}
          HIRE_USER_A_PASSWORD: ${{ secrets.HIRE_SMOKE_USER_A_PASSWORD }}
          HIRE_USER_B_EMAIL: ${{ secrets.HIRE_SMOKE_USER_B_EMAIL }}
          HIRE_USER_B_PASSWORD: ${{ secrets.HIRE_SMOKE_USER_B_PASSWORD }}
          DATABASE_URL: ${{ secrets.ISOLATION_DATABASE_URL }}
        run: |
          set -euo pipefail
          export ZAKI_BASE_URL="${ZAKI_ISOLATION_BASE_URL:-${SMOKE_BASE_URL:-}}"
          node scripts/multiuser-isolation-suite.mjs

  memory-load:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve load config
        id: load-config
        env:
          LOAD_BASE_URL: ${{ secrets.LOAD_BASE_URL }}
          LOAD_TOKEN: ${{ secrets.LOAD_TOKEN }}
          LOAD_EMAIL: ${{ secrets.LOAD_EMAIL }}
          LOAD_PASSWORD: ${{ secrets.LOAD_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "${LOAD_BASE_URL}" ] && { [ -n "${LOAD_TOKEN}" ] || { [ -n "${LOAD_EMAIL}" ] && [ -n "${LOAD_PASSWORD}" ]; }; }; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping memory load sanity: LOAD_BASE_URL and auth secrets are not fully configured."
          fi

      - uses: actions/checkout@v4
        if: ${{ steps.load-config.outputs.enabled == 'true' }}
      - uses: actions/setup-node@v4
        if: ${{ steps.load-config.outputs.enabled == 'true' }}
        with:
          node-version: 20
          cache: npm
      - name: Install frontend deps
        if: ${{ steps.load-config.outputs.enabled == 'true' }}
        run: npm ci
      - name: Memory load sanity
        if: ${{ steps.load-config.outputs.enabled == 'true' }}
        env:
          LOAD_BASE_URL: ${{ secrets.LOAD_BASE_URL }}
          LOAD_TOKEN: ${{ secrets.LOAD_TOKEN }}
          LOAD_EMAIL: ${{ secrets.LOAD_EMAIL }}
          LOAD_PASSWORD: ${{ secrets.LOAD_PASSWORD }}
          LOAD_POLICY_VERSION: ${{ secrets.LOAD_POLICY_VERSION }}
        run: |
          set -euo pipefail
          node scripts/load-memory.mjs \
            --duration=20 \
            --concurrency=8 \
            --target-rps=4 \
            --assert-min-total=30 \
            --assert-min-success-rate=0.85 \
            --assert-max-unauthorized=2
