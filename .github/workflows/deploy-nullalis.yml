name: Deploy Nullalis

on:
  workflow_dispatch:
    inputs:
      cluster:
        description: "DigitalOcean Kubernetes cluster name"
        required: false
        default: "zaki-prod"
      namespace:
        description: "Kubernetes namespace"
        required: false
        default: "zaki-bot-staging"
      deployment:
        description: "Nullalis deployment name"
        required: false
        default: "nullclaw"
      container:
        description: "Container name inside the deployment"
        required: false
        default: "nullclaw"
      image_ref:
        description: "Optional image ref to promote, e.g. ghcr.io/projectnuggets/null-alis:sha-<commit>"
        required: false
        default: ""
      backend_namespace:
        description: "Namespace for zaki-api"
        required: false
        default: "zaki"
      backend_deployment:
        description: "Backend deployment for relay smoke"
        required: false
        default: "zaki-api"
      smoke_user_id:
        description: "Existing zaki_users.id used for relay smoke"
        required: false
        default: "1"

concurrency:
  group: deploy-nullalis
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Resolve deploy inputs
        id: inputs
        env:
          INPUT_CLUSTER: ${{ github.event.inputs.cluster }}
          INPUT_NAMESPACE: ${{ github.event.inputs.namespace }}
          INPUT_DEPLOYMENT: ${{ github.event.inputs.deployment }}
          INPUT_CONTAINER: ${{ github.event.inputs.container }}
          INPUT_IMAGE_REF: ${{ github.event.inputs.image_ref }}
          INPUT_BACKEND_NAMESPACE: ${{ github.event.inputs.backend_namespace }}
          INPUT_BACKEND_DEPLOYMENT: ${{ github.event.inputs.backend_deployment }}
          INPUT_SMOKE_USER_ID: ${{ github.event.inputs.smoke_user_id }}
        run: |
          echo "cluster=${INPUT_CLUSTER:-zaki-prod}" >> "$GITHUB_OUTPUT"
          echo "namespace=${INPUT_NAMESPACE:-zaki-bot-staging}" >> "$GITHUB_OUTPUT"
          echo "deployment=${INPUT_DEPLOYMENT:-nullclaw}" >> "$GITHUB_OUTPUT"
          echo "container=${INPUT_CONTAINER:-nullclaw}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${INPUT_IMAGE_REF:-}" >> "$GITHUB_OUTPUT"
          echo "backend_namespace=${INPUT_BACKEND_NAMESPACE:-zaki}" >> "$GITHUB_OUTPUT"
          echo "backend_deployment=${INPUT_BACKEND_DEPLOYMENT:-zaki-api}" >> "$GITHUB_OUTPUT"
          echo "smoke_user_id=${INPUT_SMOKE_USER_ID:-1}" >> "$GITHUB_OUTPUT"

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ steps.inputs.outputs.cluster }}"

      - name: Preflight — verify deployment exists
        id: preflight
        run: |
          set -euo pipefail
          echo "Target: ${{ steps.inputs.outputs.deployment }} in namespace ${{ steps.inputs.outputs.namespace }}"
          if ! kubectl get deployment "${{ steps.inputs.outputs.deployment }}" -n "${{ steps.inputs.outputs.namespace }}" > /dev/null 2>&1; then
            echo "::error::Deployment '${{ steps.inputs.outputs.deployment }}' not found in namespace '${{ steps.inputs.outputs.namespace }}'. Aborting."
            exit 1
          fi
          if ! kubectl get deployment "${{ steps.inputs.outputs.backend_deployment }}" -n "${{ steps.inputs.outputs.backend_namespace }}" > /dev/null 2>&1; then
            echo "::error::Backend deployment '${{ steps.inputs.outputs.backend_deployment }}' not found in namespace '${{ steps.inputs.outputs.backend_namespace }}'."
            exit 1
          fi
          for object in "secret/nullclaw-runtime-secrets" "serviceaccount/nullclaw" "configmap/nullclaw-litestream-config" "pvc/nullclaw-data-rwx" "service/${{ steps.inputs.outputs.deployment }}"; do
            if ! kubectl get "${object}" -n "${{ steps.inputs.outputs.namespace }}" > /dev/null 2>&1; then
              echo "::error::Required object '${object}' not found in namespace '${{ steps.inputs.outputs.namespace }}'."
              exit 1
            fi
          done
          current_image="$(kubectl get deployment "${{ steps.inputs.outputs.deployment }}" -n "${{ steps.inputs.outputs.namespace }}" -o jsonpath='{.spec.template.spec.containers[?(@.name=="${{ steps.inputs.outputs.container }}")].image}')"
          if [ -z "${current_image}" ]; then
            echo "::error::Could not resolve current image for container '${{ steps.inputs.outputs.container }}'."
            exit 1
          fi
          selected_image="${{ steps.inputs.outputs.image_ref }}"
          if [ -z "${selected_image}" ]; then
            selected_image="${current_image}"
          fi
          echo "previous_image=${current_image}" >> "$GITHUB_OUTPUT"
          echo "selected_image=${selected_image}" >> "$GITHUB_OUTPUT"
          kubectl get deployment "${{ steps.inputs.outputs.deployment }}" -n "${{ steps.inputs.outputs.namespace }}" -o wide
          echo "✅ Deployment exists"

      - name: Preflight — validate secret contract
        run: |
          set -euo pipefail
          secret_name="nullclaw-runtime-secrets"
          namespace="${{ steps.inputs.outputs.namespace }}"
          for key in TOGETHER_API_KEY INTERNAL_SERVICE_TOKEN POSTGRES_CONNECTION_STRING; do
            value="$(kubectl get secret "${secret_name}" -n "${namespace}" -o "jsonpath={.data.${key}}" || true)"
            if [ -z "${value}" ]; then
              echo "::error::Required secret key '${key}' is missing from ${secret_name}."
              exit 1
            fi
          done
          internal_token="$(kubectl get secret "${secret_name}" -n "${namespace}" -o jsonpath='{.data.INTERNAL_SERVICE_TOKEN}' | base64 -d)"
          token_len="${#internal_token}"
          if [ "${token_len}" -lt 16 ]; then
            echo "::error::INTERNAL_SERVICE_TOKEN must be at least 16 characters."
            exit 1
          fi
          case "$(printf '%s' "${internal_token}" | tr '[:upper:]' '[:lower:]')" in
            test-internal-token|dev-internal-token|changeme|change-me|default)
              echo "::error::INTERNAL_SERVICE_TOKEN is denylisted."
              exit 1
              ;;
          esac

      - name: Apply Nullalis runtime config
        run: |
          set -euo pipefail
          namespace="${{ steps.inputs.outputs.namespace }}"
          kubectl create configmap nullclaw-runtime-config \
            --from-env-file=infra/nullalis/runtime/runtime-config.env \
            -n "${namespace}" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create configmap nullclaw-runtime-bootstrap \
            --from-file=entrypoint.sh=infra/nullalis/runtime/entrypoint.sh \
            --from-file=config.json.tmpl=infra/nullalis/runtime/config.json.tmpl \
            -n "${namespace}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Nullalis deployment
        run: |
          set -euo pipefail
          sed \
            -e "s|__NAMESPACE__|${{ steps.inputs.outputs.namespace }}|g" \
            -e "s|__DEPLOYMENT_NAME__|${{ steps.inputs.outputs.deployment }}|g" \
            -e "s|__CONTAINER_NAME__|${{ steps.inputs.outputs.container }}|g" \
            -e "s|__IMAGE_REF__|${{ steps.preflight.outputs.selected_image }}|g" \
            infra/nullalis/deployment.yaml | kubectl apply -f -

      - name: Roll out Nullalis
        run: |
          set -euo pipefail
          kubectl rollout restart deployment/"${{ steps.inputs.outputs.deployment }}" -n "${{ steps.inputs.outputs.namespace }}"
          kubectl rollout status deployment/"${{ steps.inputs.outputs.deployment }}" -n "${{ steps.inputs.outputs.namespace }}" --timeout=300s

      - name: Smoke Nullalis direct and relay paths
        run: |
          set -euo pipefail
          namespace="${{ steps.inputs.outputs.namespace }}"
          backend_namespace="${{ steps.inputs.outputs.backend_namespace }}"
          deployment="${{ steps.inputs.outputs.deployment }}"
          backend_deployment="${{ steps.inputs.outputs.backend_deployment }}"
          smoke_user_id="${{ steps.inputs.outputs.smoke_user_id }}"
          internal_token="$(kubectl get secret nullclaw-runtime-secrets -n "${namespace}" -o jsonpath='{.data.INTERNAL_SERVICE_TOKEN}' | base64 -d)"

          cleanup() {
            jobs -p | xargs -r kill || true
          }
          trap cleanup EXIT

          wait_for_http() {
            name="$1"
            url="$2"
            pid="$3"
            log_file="$4"

            for _ in $(seq 1 30); do
              if curl -fsS "${url}" >/dev/null 2>&1; then
                return 0
              fi
              if ! kill -0 "${pid}" >/dev/null 2>&1; then
                echo "${name} port-forward exited before becoming ready."
                cat "${log_file}" || true
                return 1
              fi
              sleep 2
            done

            echo "${name} port-forward did not become ready in time."
            cat "${log_file}" || true
            return 1
          }

          kubectl port-forward service/"${deployment}" -n "${namespace}" 13000:80 >/tmp/nullalis-port-forward.log 2>&1 &
          nullalis_pf_pid=$!
          kubectl port-forward deployment/"${backend_deployment}" -n "${backend_namespace}" 18787:8787 >/tmp/zaki-api-port-forward.log 2>&1 &
          backend_pf_pid=$!

          wait_for_http "nullalis" "http://127.0.0.1:13000/health" "${nullalis_pf_pid}" /tmp/nullalis-port-forward.log
          wait_for_http "zaki-api" "http://127.0.0.1:18787/health" "${backend_pf_pid}" /tmp/zaki-api-port-forward.log

          BASE_URL="http://127.0.0.1:13000" \
          INTERNAL_TOKEN="${internal_token}" \
          USER_ID="${smoke_user_id}" \
          bash infra/nullalis/smoke-direct.sh

          BACKEND_BASE_URL="http://127.0.0.1:18787" \
          INTERNAL_TOKEN="${internal_token}" \
          USER_ID="${smoke_user_id}" \
          bash infra/nullalis/smoke-relay.sh

      - name: Promote Nullalis and enable agent backend
        run: |
          set -euo pipefail
          kubectl create configmap nullclaw-deploy-state \
            --from-literal=last_known_good_image='${{ steps.preflight.outputs.selected_image }}' \
            --from-literal=last_deployed_at='${{ github.run_id }}' \
            -n "${{ steps.inputs.outputs.namespace }}" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl set env deployment/"${{ steps.inputs.outputs.backend_deployment }}" \
            -n "${{ steps.inputs.outputs.backend_namespace }}" \
            ZAKI_AGENT_BACKEND_ENABLED=true
          kubectl rollout status deployment/"${{ steps.inputs.outputs.backend_deployment }}" -n "${{ steps.inputs.outputs.backend_namespace }}" --timeout=240s

      - name: Roll back Nullalis on failure
        if: ${{ failure() }}
        run: |
          set -euo pipefail
          previous_image='${{ steps.preflight.outputs.previous_image }}'
          if [ -n "${previous_image}" ]; then
            kubectl set image deployment/"${{ steps.inputs.outputs.deployment }}" \
              "${{ steps.inputs.outputs.container }}"="${previous_image}" \
              -n "${{ steps.inputs.outputs.namespace }}"
            kubectl rollout status deployment/"${{ steps.inputs.outputs.deployment }}" -n "${{ steps.inputs.outputs.namespace }}" --timeout=300s || true
          fi
          kubectl set env deployment/"${{ steps.inputs.outputs.backend_deployment }}" \
            -n "${{ steps.inputs.outputs.backend_namespace }}" \
            ZAKI_AGENT_BACKEND_ENABLED=false
          kubectl rollout status deployment/"${{ steps.inputs.outputs.backend_deployment }}" -n "${{ steps.inputs.outputs.backend_namespace }}" --timeout=240s || true
