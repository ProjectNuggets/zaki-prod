name: CI App Frontend

on:
  pull_request:
    paths:
      - "src/**"
      - "public/**"
      - "e2e/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "jest.config.cjs"
      - "playwright.config.ts"
      - "postcss.config.mjs"
      - "tsconfig.json"
      - "tsconfig.node.json"
      - "tsconfig.typecheck.json"
      - "vite.config.ts"
      - ".github/workflows/ci-app.yml"
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "e2e/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "jest.config.cjs"
      - "playwright.config.ts"
      - "postcss.config.mjs"
      - "tsconfig.json"
      - "tsconfig.node.json"
      - "tsconfig.typecheck.json"
      - "vite.config.ts"
      - ".github/workflows/ci-app.yml"
  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install frontend deps
        run: npm ci
      - name: Frontend tests
        run: npm run test -- --runInBand
      - name: Frontend typecheck
        run: npm run typecheck
      - name: Frontend build
        run: npm run build

  frontend-e2e:
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install frontend deps
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Frontend e2e
        run: npm run test:e2e
