name: Deploy ZAKI App Frontend

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "tsconfig.node.json"
      - "tsconfig.typecheck.json"
      - "vite.config.ts"
      - "postcss.config.mjs"
      - "Dockerfile"
      - ".github/workflows/deploy-app.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io/projectnuggets
  IMAGE_NAME: zaki-web
  K8S_CLUSTER: zaki-prod
  K8S_NAMESPACE: zaki
  K8S_DEPLOYMENT: zaki-web

concurrency:
  group: deploy-app
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          platforms: linux/amd64
          build-args: |
            VITE_ZAKI_BACKEND_URL=https://api.chatzaki.com

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${K8S_CLUSTER}"

      - name: Restart app frontend deployment
        run: |
          kubectl rollout restart deployment/"${K8S_DEPLOYMENT}" -n "${K8S_NAMESPACE}"
          kubectl rollout status deployment/"${K8S_DEPLOYMENT}" -n "${K8S_NAMESPACE}" --timeout=180s
