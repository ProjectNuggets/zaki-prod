name: Build and Publish ZAKI App Frontend Image

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "tsconfig.node.json"
      - "tsconfig.typecheck.json"
      - "vite.config.ts"
      - "postcss.config.mjs"
      - "Dockerfile"
      - ".github/workflows/deploy-app.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io/projectnuggets
  IMAGE_NAME: zaki-web

concurrency:
  group: publish-app-image
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image refs
        id: image
        run: |
          image_repo="${REGISTRY}/${IMAGE_NAME}"
          sha_tag="${image_repo}:sha-${GITHUB_SHA}"
          raw_tag="${image_repo}:${GITHUB_SHA}"
          echo "sha_tag=${sha_tag}" >> "$GITHUB_OUTPUT"
          echo "raw_tag=${raw_tag}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${sha_tag}"
            echo "${raw_tag}"
            if [ "${GITHUB_REF_NAME}" = "main" ]; then
              echo "${image_repo}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push app frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.image.outputs.tags }}
          platforms: linux/amd64
          # No build-time backend URL. The SPA resolves BACKEND_URL at RUNTIME (docker-entrypoint.d/
          # 40-zaki-env.sh writes /env.js from the container env), so this one image serves every
          # environment. The per-env backend URL is set in the zaki-web Helm values (zaki-infra).
          # Web promotion is now a tag bump like zaki-api — no per-env rebuild.

      - name: Publish summary
        run: |
          echo "Published image: ${{ steps.image.outputs.sha_tag }}"
          echo "Immutable alias: ${{ steps.image.outputs.raw_tag }}"
          echo "Production promotion is owned by zaki-infra."
