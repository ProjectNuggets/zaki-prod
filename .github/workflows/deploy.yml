name: Build and Deploy ZAKI

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io/projectnuggets

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/zaki-api:latest
            ${{ env.REGISTRY }}/zaki-api:${{ github.sha }}
          platforms: linux/amd64

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/zaki-web:latest
            ${{ env.REGISTRY }}/zaki-web:${{ github.sha }}
          platforms: linux/amd64
          build-args: |
            VITE_ZAKI_BACKEND_URL=https://api.chatzaki.com

  build-website:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push website
        uses: docker/build-push-action@v5
        with:
          context: ./website
          file: ./website/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/zaki-website:latest
            ${{ env.REGISTRY }}/zaki-website:${{ github.sha }}
          platforms: linux/amd64

  deploy:
    needs: [build-backend, build-frontend, build-website]
    runs-on: ubuntu-latest
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save zaki-prod
      
      - name: Restart deployments
        run: |
          kubectl rollout restart deployment/zaki-api -n zaki
          kubectl rollout restart deployment/zaki-web -n zaki
          kubectl rollout restart deployment/zaki-website -n zaki
