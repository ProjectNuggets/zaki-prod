name: Build and Deploy ZAKI

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: registry.digitalocean.com/alis24-registry

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to DO Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DO_REGISTRY_TOKEN }}
          password: ${{ secrets.DO_REGISTRY_TOKEN }}
      
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/zaki-api:latest
            ${{ env.REGISTRY }}/zaki-api:${{ github.sha }}
          platforms: linux/amd64

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to DO Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DO_REGISTRY_TOKEN }}
          password: ${{ secrets.DO_REGISTRY_TOKEN }}
      
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/zaki-web:latest
            ${{ env.REGISTRY }}/zaki-web:${{ github.sha }}
          platforms: linux/amd64
          build-args: |
            VITE_ZAKI_BACKEND_URL=https://api.chatzaki.com

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save zaki-prod
      
      - name: Restart deployments
        run: |
          kubectl rollout restart deployment/zaki-api -n zaki
          kubectl rollout restart deployment/zaki-web -n zaki
