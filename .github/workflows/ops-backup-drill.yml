name: Ops Backup Restore Drill

on:
  schedule:
    # Weekly, Mondays 06:17 UTC (off the hour to avoid Actions congestion)
    - cron: '17 6 * * 1'
  workflow_dispatch:

jobs:
  backup-drill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Resolve drill config
        id: drill-config
        env:
          OPS_BACKUP_DATABASE_URL: ${{ secrets.OPS_BACKUP_DATABASE_URL }}
        run: |
          set -euo pipefail
          if [ -n "${OPS_BACKUP_DATABASE_URL}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping backup drill: OPS_BACKUP_DATABASE_URL not configured."
          fi

      - uses: actions/checkout@v4
        if: ${{ steps.drill-config.outputs.enabled == 'true' }}
      - uses: actions/setup-node@v4
        if: ${{ steps.drill-config.outputs.enabled == 'true' }}
        with:
          node-version: 20

      - name: Install postgresql-client (pg_dump / pg_restore / psql)
        if: ${{ steps.drill-config.outputs.enabled == 'true' }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run backup + restore drill
        if: ${{ steps.drill-config.outputs.enabled == 'true' }}
        env:
          DATABASE_URL: ${{ secrets.OPS_BACKUP_DATABASE_URL }}
          BACKUP_ADMIN_DATABASE: ${{ secrets.OPS_BACKUP_ADMIN_DATABASE }}
        run: |
          set -euo pipefail
          npm run ops:backup-drill

      - name: Upload drill evidence
        if: ${{ always() && steps.drill-config.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: backup-drill-evidence
          path: tmp/backups/*.drill.json
          if-no-files-found: ignore
