server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Frame-Options "SAMEORIGIN" always;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location = /env.js {
    add_header Cache-Control "no-store" always;
    try_files $uri =404;
  }

  location = /release.json {
    add_header Cache-Control "no-store" always;
    try_files $uri =404;
  }

  location = /site/runtime-config.js {
    add_header Cache-Control "no-store" always;
    try_files $uri =404;
  }

  location ~* \.(?:css|js|mjs|png|svg|webp|woff2)$ {
    add_header Cache-Control "public, max-age=604800, immutable";
    try_files $uri =404;
  }

  # ---------------------------------------------------------------------------
  # Legacy URL map (V4 -> V5), all 301.
  # Inventory source: https://chatzaki.com/sitemap.xml (live site, fetched
  # 2026-07-22) plus live-reachable routes from
  # archive/react-vite-legacy/src/router.tsx that the sitemap did not index.
  # Coverage is enforced by scripts/check-launch-draft.mjs against
  # scripts/legacy-url-inventory.json — update both together.
  # ---------------------------------------------------------------------------

  # English pages with no V5 successor page
  location = /story { return 301 /; }
  location = /story/ { return 301 /; }
  location = /autism-guidance { return 301 /; }
  location = /autism-guidance/ { return 301 /; }
  location = /best-arabic-ai-assistant { return 301 /; }
  location = /best-arabic-ai-assistant/ { return 301 /; }
  location = /use-cases { return 301 /; }
  location = /use-cases/ { return 301 /; }

  # FAQ and contact live as sections on the V5 home page
  location = /faq { return 301 "/#faq"; }
  location = /faq/ { return 301 "/#faq"; }
  location = /contact { return 301 "/#contact"; }
  location = /contact/ { return 301 "/#contact"; }

  # Old assistant/product and comparison pages -> ZAKI Agent
  # (the V4 router itself sent /zaki-bot, /vs-chatgpt, /zaki-vs-* to /product)
  location = /product { return 301 /products/agent/; }
  location = /product/ { return 301 /products/agent/; }
  location = /agent { return 301 /products/agent/; }
  location = /agent/ { return 301 /products/agent/; }
  location = /zaki-bot { return 301 /products/agent/; }
  location = /zaki-bot/ { return 301 /products/agent/; }
  location = /vs-chatgpt { return 301 /products/agent/; }
  location = /vs-chatgpt/ { return 301 /products/agent/; }
  location = /zaki-vs-openclaw { return 301 /products/agent/; }
  location = /zaki-vs-openclaw/ { return 301 /products/agent/; }
  location = /zaki-vs-spaces { return 301 /products/agent/; }
  location = /zaki-vs-spaces/ { return 301 /products/agent/; }
  location = /spaces { return 301 /products/spaces/; }
  location = /spaces/ { return 301 /products/spaces/; }

  # How-to guides -> closest product page, else home
  location = /how-to/what-to-use-zaki-for { return 301 /products/agent/; }
  location = /how-to/what-to-use-zaki-for/ { return 301 /products/agent/; }
  location = /how-to/what-to-use-spaces-for { return 301 /products/spaces/; }
  location = /how-to/what-to-use-spaces-for/ { return 301 /products/spaces/; }
  location = /how-to/how-zaki-and-spaces-work { return 301 /products/spaces/; }
  location = /how-to/how-zaki-and-spaces-work/ { return 301 /products/spaces/; }
  location = /how-to/create-social-media-content-arabic { return 301 /; }
  location = /how-to/create-social-media-content-arabic/ { return 301 /; }
  location = /how-to/translate-dialects-arabic-english { return 301 /; }
  location = /how-to/translate-dialects-arabic-english/ { return 301 /; }
  location = /how-to/write-arabic-emails-ai { return 301 /; }
  location = /how-to/write-arabic-emails-ai/ { return 301 /; }

  # Arabic mirror pages -> the English equivalent's V5 target
  location = /ar { return 301 /; }
  location = /ar/ { return 301 /; }
  location = /ar/story { return 301 /; }
  location = /ar/story/ { return 301 /; }
  location = /ar/autism-guidance { return 301 /; }
  location = /ar/autism-guidance/ { return 301 /; }
  location = /ar/use-cases { return 301 /; }
  location = /ar/use-cases/ { return 301 /; }
  location = /ar/faq { return 301 "/#faq"; }
  location = /ar/faq/ { return 301 "/#faq"; }
  location = /ar/contact { return 301 "/#contact"; }
  location = /ar/contact/ { return 301 "/#contact"; }
  location = /ar/zaki-bot { return 301 /products/agent/; }
  location = /ar/zaki-bot/ { return 301 /products/agent/; }
  location = /ar/product { return 301 /products/agent/; }
  location = /ar/product/ { return 301 /products/agent/; }
  location = /ar/pricing { return 301 /pricing/; }
  location = /ar/pricing/ { return 301 /pricing/; }
  location = /ar/privacy { return 301 /privacy/; }
  location = /ar/privacy/ { return 301 /privacy/; }
  location = /ar/terms { return 301 /terms/; }
  location = /ar/terms/ { return 301 /terms/; }
  location = /ar/compliance { return 301 /compliance/; }
  location = /ar/compliance/ { return 301 /compliance/; }

  # Any other legacy Arabic or how-to URL falls back to the V5 home page
  # (the V4 router wildcarded /how-to/* and every unknown path to a real page)
  location = /how-to { return 301 /; }
  location ^~ /ar/ { return 301 /; }
  location ^~ /how-to/ { return 301 /; }

  location / {
    try_files $uri $uri.html $uri/index.html =404;
  }
}
