server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Content-hashed build assets (index-<hash>.js, etc.) are immutable — cache them forever so repeat
  # visits are fast. A new deploy produces new hashes, so this is always safe.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # The SPA entry point and the runtime config MUST always be revalidated, or browsers cache a stale
  # index.html and never load a new deploy (the bundle reference inside it goes stale). "no-cache"
  # lets the browser keep a copy but forces an etag revalidation every load (cheap 304 when unchanged).
  # This block also covers the SPA fallback (any route -> index.html via try_files below).
  location / {
    add_header Cache-Control "no-cache";
    try_files $uri /index.html;
  }
}
