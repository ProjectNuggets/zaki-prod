server {
  listen 80;
  server_name _;
  server_tokens off;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data:; font-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' https://api.chatzaki.com https://api-staging.chatzaki.ai; upgrade-insecure-requests" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;

  if ($host = www.novanuggets.com) {
    return 301 https://novanuggets.com$request_uri;
  }

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  location = /blog {
    return 301 https://novanuggets.com/field-notes/;
  }

  location = /blog/ {
    return 301 https://novanuggets.com/field-notes/;
  }

  location = /work-with-us {
    return 301 https://novanuggets.com/contact/;
  }

  location = /contact {
    return 301 https://novanuggets.com/contact/;
  }

  location = /privacy {
    return 301 https://novanuggets.com/privacy/;
  }

  location = /terms {
    return 301 https://novanuggets.com/terms/;
  }

  location = /blog/forget-agents-ai-ownership-is-the-new-frontier-of-enterprise-value {
    return 301 https://novanuggets.com/field-notes/ai-workforce/;
  }

  location = /blog/the-ai-hype-cycle-is-ending-the-execution-era-is-here {
    return 301 https://novanuggets.com/field-notes/;
  }

  location = "/blog/why-ai-agents-fail-inside-real-companies-(and-how-to-fix-it)" {
    return 301 https://novanuggets.com/field-notes/ai-workforce/;
  }

  location = /blog/why-on-prem-ai-infrastructure-is-the-strategic-power-move-in-2025 {
    return 301 https://novanuggets.com/field-notes/private-ai-infrastructure/;
  }

  location = /blog/the-future-of-workflows-why-ai-automation-is-the-standard {
    return 301 https://novanuggets.com/field-notes/rag-automation/;
  }

  location = /blog/5-ways-ai-assistants-are-transforming-operations {
    return 301 https://novanuggets.com/field-notes/ai-workforce/;
  }

  location = /blog/scaling-smarter-how-automation-helps-startups {
    return 301 https://novanuggets.com/field-notes/;
  }

  location = /blog/beyond-bots-real-business-impact-from-ai-integration {
    return 301 https://novanuggets.com/field-notes/ai-workforce/;
  }

  location = /env.js {
    expires -1;
    try_files $uri =404;
  }

  location ~* ^/assets/index-[A-Za-z0-9_-]+\.(?:js|css)$ {
    expires 1y;
    try_files $uri =404;
  }

  location ~* \.(?:woff2|svg|png|jpg|jpeg|webp|avif)$ {
    expires 7d;
    try_files $uri =404;
  }

  location /assets/downloads/ {
    expires 1h;
    types {
      application/pdf pdf;
      application/vnd.openxmlformats-officedocument.spreadsheetml.sheet xlsx;
    }
    try_files $uri =404;
  }

  location / {
    expires -1;
    try_files $uri $uri/ /index.html;
  }
}
