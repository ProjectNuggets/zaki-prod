apiVersion: apps/v1
kind: Deployment
metadata:
  name: __DEPLOYMENT_NAME__
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/name: nullclaw
    app.kubernetes.io/part-of: zaki-bot
spec:
  replicas: 1
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nullclaw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nullclaw
        app.kubernetes.io/part-of: zaki-bot
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: nullclaw
      terminationGracePeriodSeconds: 180
      containers:
        - name: __CONTAINER_NAME__
          image: __IMAGE_REF__
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: nullclaw-runtime-config
            - secretRef:
                name: nullclaw-runtime-secrets
          command:
            - /bin/sh
            - /opt/nullalis-runtime/entrypoint.sh
          volumeMounts:
            - name: tenant-data
              mountPath: /data
            - name: runtime-bootstrap
              mountPath: /opt/nullalis-runtime
              readOnly: true
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 24
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    curl -sS -X POST "http://127.0.0.1:3000/internal/drain" -H "X-Internal-Token: ${INTERNAL_SERVICE_TOKEN}" || true
                    sleep 5
                    curl -sS -X POST "http://127.0.0.1:3000/internal/shutdown" -H "X-Internal-Token: ${INTERNAL_SERVICE_TOKEN}" || true
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
        - name: litestream
          image: litestream/litestream:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: nullclaw-runtime-config
            - secretRef:
                name: nullclaw-runtime-secrets
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              exec litestream replicate -config /etc/litestream/litestream.yml
          volumeMounts:
            - name: tenant-data
              mountPath: /data
            - name: litestream-config
              mountPath: /etc/litestream
              readOnly: true
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: tenant-data
          persistentVolumeClaim:
            claimName: nullclaw-data-rwx
        - name: litestream-config
          configMap:
            name: nullclaw-litestream-config
        - name: runtime-bootstrap
          configMap:
            name: nullclaw-runtime-bootstrap
            defaultMode: 0755
